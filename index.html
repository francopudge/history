<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD League Champion Team Parade</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        /* --- 1. LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #00008B;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }

        .loader-logo {
            width: clamp(100px, 20vw, 150px);
            margin-bottom: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .loading-text {
            color: #ADD8E6;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 2rem;
        }

        /* --- 2. BASE STYLE --- */
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #00008B;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header Responsive */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: clamp(60px, 10vh, 75px);
            background-color: #ADD8E6;
            color: #00008B;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 min(5%, 20px);
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 70%;
        }

        .header-left img {
            height: clamp(35px, 5vw, 50px);
            width: auto;
        }

        .header-left span {
            font-weight: bold;
            text-transform: uppercase;
            font-size: clamp(0.7rem, 2vw, 1rem);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-control {
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .music-control:hover { transform: scale(1.1); }

        .music-control img {
            height: clamp(30px, 5vw, 45px);
            width: auto;
        }

        /* --- 3. CONTENT STYLE --- */
        .hero-section {
            margin-top: 120px;
            text-align: center;
            padding: 0 20px;
        }

        .hero-logo { 
            width: clamp(120px, 25vw, 180px); 
            margin-bottom: 15px; 
        }

        .hero-text {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 800;
            color: #ADD8E6;
            max-width: 1000px;
            margin: 0 auto;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .season-divider {
            max-width: 1200px;
            margin: 60px auto 30px;
            text-align: center;
            border-bottom: 2px solid rgba(173, 216, 230, 0.3);
            line-height: 0.1em;
        }

        .season-divider span {
            background: #00008B;
            padding: 0 15px;
            font-size: clamp(1rem, 3vw, 1.8rem);
            font-weight: bold;
            color: #ADD8E6;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .img-card {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 15px;
            transition: all 0.3s ease;
            border: 1px solid rgba(173, 216, 230, 0.15);
        }

        .img-card:hover {
            transform: translateY(-8px);
            border-color: #ADD8E6;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .img-card img { 
            width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 10px; 
        }

        footer {
            background-color: #ADD8E6;
            color: #00008B;
            text-align: center;
            padding: 50px 20px;
            margin-top: 100px;
            font-weight: bold;
            font-size: clamp(0.8rem, 2vw, 1rem);
        }

        @media (max-width: 350px) {
            .container { grid-template-columns: 1fr; }
            .hero-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="logo.png" alt="Loading Logo" class="loader-logo">
        <div class="loading-text"><span id="percent">0</span>%</div>
    </div>

    <audio id="mySong" src="God's anger extended [Link in description].mp3" loop></audio>

    <header>
        <div class="header-left">
            <img src="logo.png" alt="Logo">
            <span>Generations of Duelist</span>
        </div>
        
        <div class="music-control" onclick="toggleMusic()">
            <img id="musicIcon" src="play.png" alt="Play/Pause">
        </div>
    </header>

    <div class="hero-section">
        <img src="logo.png" alt="Logo Utama" class="hero-logo">
        <h1 class="hero-text">Selamat Datang Di GOD League Champion Team Parade</h1>
    </div>

    <section>
        <h2 class="season-divider"><span>Season 2</span></h2>
        <div class="container">
            <div class="img-card"><img src="1.png" alt="Team 1"></div>
            <div class="img-card"><img src="2.png" alt="Team 2"></div>
            <div class="img-card"><img src="3.png" alt="Team 3"></div>
        </div>
    </section>

    <section>
        <h2 class="season-divider"><span>Season 3</span></h2>
        <div class="container">
            <div class="img-card"><img src="4.png" alt="Team 4"></div>
            <div class="img-card"><img src="5.png" alt="Team 5"></div>
            <div class="img-card"><img src="6.png" alt="Team 6"></div>
        </div>
    </section>

    <footer>
        &copy; 2026 Generations of Duelist
    </footer>

    <script>
        let song = document.getElementById("mySong");
        let icon = document.getElementById("musicIcon");

        function toggleMusic() {
            if (song.paused) {
                song.play();
                icon.src = "pause.png";
            } else {
                song.pause();
                icon.src = "play.png";
            }
        }

        function startLoading() {
            let percentDisplay = document.getElementById('percent');
            let loader = document.getElementById('loader');
            let count = 0;

            let interval = setInterval(() => {
                count++;
                percentDisplay.innerText = count;

                if (count === 100) {
                    clearInterval(interval);
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.visibility = 'hidden';
                        document.body.style.overflowY = 'auto';
                        
                        // Lagu tidak diputar otomatis (Hanya pastikan ikon tetap play)
                        icon.src = "play.png";
                    }, 600);
                }
            }, 15);
        }

        document.body.style.overflowY = 'hidden';
        window.onload = startLoading;
    </script>

</body>
</html>
